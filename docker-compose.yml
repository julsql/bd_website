version: '3.8'
services:
  bd:
    build: .
    container_name: bd
    working_dir: /app/bd
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
    expose:
      - "8000"
    environment:
      - DEBUG=False
    networks:
      - bd-network

  nginx:
    image: nginx:latest
    container_name: bd_nginx
    ports:
      - "8089:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - bd
    networks:
      - bd-network

networks:
  bd-network:
    driver: bridge
