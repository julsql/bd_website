version: '3.8'

services:
  django:
    build:
      context: . # Emplacement du Dockerfile
    container_name: bd
    ports:
      - "8000:8000" # Expose le port 8000
    volumes:
      - ./bd/media:/app/bd/media # Monte le dossier local 'media' dans le conteneur
    environment:
      - DEBUG=False
    command: cd bd; gunicorn config.wsgi:application --bind 0.0.0.0:8000
